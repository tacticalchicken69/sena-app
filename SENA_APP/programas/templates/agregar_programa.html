{% extends "master.html" %}
{% load static %}

{% block title %}Agregar Programa{% endblock %}

{% block content %}
<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow">
        <div class="card-header bg-sena-green text-white">
          <h3 class="mb-0">Nuevo Programa</h3>
        </div>
        <div class="card-body">
          <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="mt-3">
              <button type="submit" class="btn btn-success">Guardar</button>
              <a href="{% url 'programas:lista_programas' %}" class="btn btn-secondary">Cancelar</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
